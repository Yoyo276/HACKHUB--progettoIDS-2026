# Nome dell'applicazione
spring.application.name=hackhub-demo
server.port=8080

# --- CONFIGURAZIONE DATABASE H2 ---
spring.datasource.url=jdbc:h2:mem:hackhubdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- LOGICA DI CREAZIONE TABELLE ---
# 'create-drop' cancella e ricrea le tabelle a ogni avvio (pulisce i residui)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- INIZIALIZZAZIONE DATI (data.sql) ---
# Forza l'esecuzione del data.sql
spring.sql.init.mode=always
# FONDAMENTALE: Aspetta che Hibernate crei le tabelle prima di inserire i dati del data.sql
spring.jpa.defer-datasource-initialization=true

# --- CONSOLE H2 ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Permette di vedere la console H2 dentro i frame del browser (evita 403 in H2)
spring.h2.console.settings.web-allow-others=true

# --- CONFIGURAZIONE JWT ---
# Cambia la chiave se vuoi, ma questa va bene per i test
hackhub.jwt.secret=QuestaEunaChiaveSegretaMoltoLungaPerIngegneriaDelSoftware2026
hackhub.jwt.expirationMs=86400000

# --- LOGGING ---
# Utile per vedere se ci sono errori nel caricamento dell'utente
logging.level.org.springframework.security=DEBUG
